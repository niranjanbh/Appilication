AWSTemplateFormatVersion: "2010-09-09"
Description: "Kyros CloudFront distribution for public website (kyros.clinic)"

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]
    Default: production
  WebsiteS3BucketDomain:
    Type: String
    Description: "S3 website endpoint (e.g. kyros-website-prod.s3-website.ap-south-1.amazonaws.com)"
  WebsiteS3BucketName:
    Type: String
    Description: "S3 bucket name holding the built Next.js static export"
  AcmCertificateArn:
    Type: String
    Description: "ACM certificate ARN in us-east-1 (required for CloudFront)"
  HostedZoneName:
    Type: String
    Default: "kyros.clinic"

Resources:

  # OAC for S3 private bucket access
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "kyros-${Environment}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Comment: !Sub "Kyros ${Environment} website"
        DefaultRootObject: index.html

        Aliases:
          - !If [IsProd, "kyros.clinic", !Sub "staging.kyros.clinic"]
          - !If [IsProd, "www.kyros.clinic", !Ref AWS::NoValue]

        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

        Origins:
          - Id: S3WebsiteOrigin
            DomainName: !Sub "${WebsiteS3BucketName}.s3.ap-south-1.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id

        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS]

        CacheBehaviors:
          # Next.js static chunks — long-lived cache (content-hashed filenames)
          - PathPattern: "/_next/static/*"
            TargetOriginId: S3WebsiteOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            Compress: true
            AllowedMethods: [GET, HEAD]

          # Images
          - PathPattern: "/images/*"
            TargetOriginId: S3WebsiteOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            Compress: true
            AllowedMethods: [GET, HEAD]

        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 10

        Logging:
          Bucket: !Sub "kyros-${Environment}-cf-logs.s3.amazonaws.com"
          IncludeCookies: false
          Prefix: !Sub "website/${Environment}/"

        PriceClass: PriceClass_All

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "kyros-${Environment}-security-headers"
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true

  # S3 bucket policy allowing CloudFront OAC
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteS3BucketName
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${WebsiteS3BucketName}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}"

Conditions:
  IsProd: !Equals [!Ref Environment, production]

Outputs:
  DistributionId:
    Value: !Ref WebsiteDistribution
  DistributionDomainName:
    Value: !GetAtt WebsiteDistribution.DomainName
