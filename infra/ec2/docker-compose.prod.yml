# Phase 1 production Docker Compose — runs on a single EC2 instance (ap-south-1),
# recommended t3.small (2 vCPU, 2 GB RAM).
# Postgres runs in-container on this host (no RDS) — KYROS_DATABASE_URL in
# /etc/kyros/backend.env points at postgres:5432 over the compose network.
# Data persists in the kyros_postgres_data named volume. Pre-migration logical
# backups are pg_dump'd to S3 by infra/scripts/snapshot-before-deploy.sh.
# Redis runs in-container: it holds only ephemeral state (OTPs, rate limits, Celery
# queue — security rule #13), so a managed ElastiCache node is deferred.
# Managed by systemd unit kyros-backend.service.
# Secrets are pre-written to /etc/kyros/backend.env by kyros-prepare-env.sh.
# Deploy: pull new image tag, then `docker compose -f /etc/kyros/docker-compose.yml up -d`
#
# Memory budget (~1.39 GB of 2 GB on t3.small — leaves ~0.65 GB for OS/containerd):
#   redis 64M | postgres 256M | api 512M | worker 384M | beat 128M | caddy 48M
# If `docker stats` / `free -h` shows sustained pressure, resize to t3.medium.

services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    env_file: /etc/kyros/backend.env
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/kyros/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # Conservative tuning to fit the t3.small memory budget alongside the app containers.
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=192MB
      -c max_connections=30
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Cap at 48 MB so it doesn't grow unbounded on a 1 GB host
    command: >
      redis-server
      --maxmemory 48mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 24M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backend-api:
    image: ${ECR_REGISTRY}/kyros-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /etc/kyros/backend.env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 200M
    # No command override: the prod image's CMD runs uvicorn with 2 workers
    # (gunicorn is not installed in the image). 2 workers fits the t3.small
    # memory budget alongside in-container Postgres.
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery-worker:
    image: ${ECR_REGISTRY}/kyros-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /etc/kyros/backend.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 150M
    # concurrency=2 to stay within memory budget
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=INFO
      --queues=ocr,notifications,reports,payments,maintenance,default
      --concurrency=2
      --max-tasks-per-child=50
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery-beat:
    image: ${ECR_REGISTRY}/kyros-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /etc/kyros/backend.env
    volumes:
      - /var/lib/kyros/beat:/app/beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 48M
    command: >
      celery -A app.worker.celery_app beat
      --loglevel=INFO
      --schedule=/app/beat/celerybeat-schedule
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Terminates TLS for Cloudflare "Full (strict)" using a Cloudflare Origin CA
  # cert/key placed at /etc/kyros/caddy-certs by the bootstrap step. Proxies
  # everything to backend-api over the compose network.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - /etc/kyros/Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/kyros/caddy-certs:/etc/caddy/certs:ro
      - caddy_data:/data
    depends_on:
      backend-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 48M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  caddy_data:
    name: kyros_caddy_data
  postgres_data:
    name: kyros_postgres_data
