# Phase 1 production Docker Compose — runs on a single EC2 instance (ap-south-1),
# recommended t3.small (2 vCPU, 2 GB RAM).
# Postgres runs on RDS (managed, encrypted, automated backups) — KYROS_DATABASE_URL
# in /etc/kyros/backend.env points at the RDS endpoint with ssl=require.
# Redis runs in-container: it holds only ephemeral state (OTPs, rate limits, Celery
# queue — security rule #13), so a managed ElastiCache node is deferred.
# Managed by systemd unit kyros-backend.service.
# Secrets are pre-written to /etc/kyros/backend.env by kyros-prepare-env.sh.
# Requires 2 GB swap enabled on the host (setup step, not done here).
#
# Deploy: pull new image tag, then `docker compose -f /etc/kyros/docker-compose.yml up -d`
#
# Memory budget (~1.1 GB of 2 GB on t3.small):
#   redis 64M | api 512M | worker 384M | beat 128M | caddy 48M

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Cap at 48 MB so it doesn't grow unbounded on a 1 GB host
    command: >
      redis-server
      --maxmemory 48mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 24M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backend-api:
    image: ${ECR_REGISTRY}/kyros-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /etc/kyros/backend.env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 200M
    # 2 workers — Postgres moved to RDS, freeing ~200 MB on the host
    command: >
      gunicorn app.main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --keepalive 5
      --access-logfile -
      --error-logfile -
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery-worker:
    image: ${ECR_REGISTRY}/kyros-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /etc/kyros/backend.env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 150M
    # concurrency=2 to stay within memory budget
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=INFO
      --queues=ocr,notifications,reports,payments,maintenance,default
      --concurrency=2
      --max-tasks-per-child=50
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery-beat:
    image: ${ECR_REGISTRY}/kyros-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: /etc/kyros/backend.env
    volumes:
      - /var/lib/kyros/beat:/app/beat
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 48M
    command: >
      celery -A app.worker.celery_app beat
      --loglevel=INFO
      --schedule=/app/beat/celerybeat-schedule
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Terminates TLS for Cloudflare "Full (strict)" using a Cloudflare Origin CA
  # cert/key placed at /etc/kyros/caddy-certs by the bootstrap step. Proxies
  # everything to backend-api over the compose network.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - /etc/kyros/Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/kyros/caddy-certs:/etc/caddy/certs:ro
      - caddy_data:/data
    depends_on:
      backend-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 48M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  caddy_data:
    name: kyros_caddy_data
