name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/ec2/**'
      - 'infra/scripts/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend
  cancel-in-progress: false   # never cancel a running deploy mid-flight

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: kyros-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # docker-compose.test.yml only provides postgres-test + redis-test on host
      # ports 55432/56379 — pytest runs on the runner itself, mirroring `make test`.
      - name: Start test services
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run migrations on test DB
        working-directory: backend
        env:
          KYROS_DATABASE_URL: postgresql+asyncpg://kyros:test@localhost:55432/kyros_test
          KYROS_JWT_SECRET: test_jwt_secret_minimum_32_characters_long_xxxx
          KYROS_OTP_SECRET: test_otp_secret_minimum_32_characters_long_yyyy
        run: uv run alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          KYROS_DATABASE_URL: postgresql+asyncpg://kyros:test@localhost:55432/kyros_test
          KYROS_REDIS_URL: redis://localhost:56379/0
          KYROS_CELERY_BROKER_URL: redis://localhost:56379/1
          KYROS_CELERY_RESULT_BACKEND: redis://localhost:56379/2
        run: uv run pytest -v

  build-and-deploy:
    name: Build → Push → Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: prod
          push: true
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      - name: Install SSM Session Manager plugin
        run: |
          curl -sSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Deploy to EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Write SSH key (used over an SSM Session Manager tunnel — EC2_HOST is
          # the instance ID; no public IP or open port 22 required)
          install -m 0600 /dev/null /tmp/deploy_key
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key

          bash infra/scripts/deploy-phase1.sh "${{ github.sha }}"