# DISABLED — Cloudflare Git integration handles website deploys directly.
# Cloudflare triggers on push to main and runs:
#   pnpm install --frozen-lockfile && pnpm --filter website build
# using wrangler.toml at the repo root. Re-enable this workflow only if
# switching away from Cloudflare's built-in CI.

name: Deploy Website

on:
  workflow_dispatch:   # manual trigger only; automatic deploys are via Cloudflare CI

concurrency:
  group: deploy-website
  cancel-in-progress: true   # new website push supersedes an in-flight one

jobs:
  build-and-deploy:
    name: Build → Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter website typecheck

      - name: Build
        run: pnpm --filter website build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ vars.NEXT_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Run next-on-pages adapter
        working-directory: website
        run: npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: kyros-website
          directory: website/.vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}