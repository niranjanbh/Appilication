name: Deploy Doctor Portal to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'doctor-portal/**'
      - 'design-tokens/**'
      - '.github/workflows/deploy-doctor-portal.yml'
  workflow_dispatch:

concurrency:
  group: deploy-doctor-portal
  cancel-in-progress: true

jobs:
  deploy:
    name: Build → Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @kyros/doctor-portal run typecheck

      - name: Build
        run: pnpm --filter @kyros/doctor-portal run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Cloudflare Workers
        working-directory: doctor-portal
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
