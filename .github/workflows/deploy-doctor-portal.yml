name: Deploy Doctor Portal

on:
  push:
    branches: [main]
    paths:
      - 'doctor-portal/**'
      - 'design-tokens/**'
      - '.github/workflows/deploy-doctor-portal.yml'

concurrency:
  group: deploy-doctor-portal
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1

jobs:
  build-and-deploy:
    name: Build → Upload to S3 → Invalidate CloudFront
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate API types from OpenAPI spec
        run: pnpm --filter doctor-portal generate:api

      - name: Build
        run: pnpm --filter doctor-portal build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Long-lived cache for hashed assets, no-cache for index.html
          aws s3 sync doctor-portal/dist/ s3://${{ secrets.S3_BUCKET_DOCTOR_PORTAL }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp doctor-portal/dist/index.html \
            s3://${{ secrets.S3_BUCKET_DOCTOR_PORTAL }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_DOCTOR_PORTAL }} \
            --paths "/*"
