name = "kyros-website"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "kyrosclinic.com", custom_domain = true },
  { pattern = "www.kyrosclinic.com", custom_domain = true },
]

[assets]
directory = "./out"
binding = "ASSETS"

[vars]
# Public FastAPI backend base URL the Worker proxies /api/contact and /api/book to.
BACKEND_URL = "https://api.kyrosclinic.com"

# TURNSTILE_SECRET_KEY is a secret, not a var — set it with:
#   wrangler secret put TURNSTILE_SECRET_KEY
# Never commit it here. If it is unset, the Worker skips verification (fails open)
# so form submissions are not blocked before Turnstile is configured.
