<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyros Clinic Admin — Login</title>
  <link rel="stylesheet" href="/admin/static/css/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Kyros Clinic</h1>
    <p>Super admin portal. Authorised personnel only.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <input type="hidden" name="next_url" value="{{ next }}">
      <div class="form-group">
        <label for="email_or_phone">Email or phone</label>
        <input id="email_or_phone" name="email_or_phone" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Sign in</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:13px;">
      <a href="/admin/forgot-password">Forgot your password?</a>
    </p>
  </div>
</div>
</body>
</html>
