<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kyros Admin{% endblock %}</title>
  <link rel="stylesheet" href="/admin/static/css/admin.css">
  <!-- HTMX 2.0 and Alpine.js via CDN for internal admin tool.
       Production: bundle to /admin/static/js/ -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.7/dist/cdn.min.js" defer></script>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Kyros</h1>
      <p>Super Admin</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/" class="{{ 'active' if request.url.path in ['/', '/admin', '/admin/'] else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/admin/users" class="{{ 'active' if request.url.path.startswith('/admin/users') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>
        Users
      </a>
      <a href="/admin/doctors" class="{{ 'active' if request.url.path.startswith('/admin/doctors') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/><path d="M2 21c0-4.4 4.5-8 10-8s10 3.6 10 8"/></svg>
        Doctors
      </a>
      <a href="/admin/doctors/pipeline" class="{{ 'active' if request.url.path == '/admin/doctors/pipeline' else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        Pipeline
      </a>
      <a href="/admin/consultations" class="{{ 'active' if request.url.path.startswith('/admin/consultations') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Consultations
      </a>
      <a href="/admin/content" class="{{ 'active' if request.url.path.startswith('/admin/content') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Content
      </a>
      <a href="/admin/analytics" class="{{ 'active' if request.url.path.startswith('/admin/analytics') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analytics
      </a>
      <a href="/admin/audit-log" class="{{ 'active' if request.url.path.startswith('/admin/audit-log') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Audit Log
      </a>
    </nav>
    <div class="sidebar-footer">
      {% if admin %}
      <small>{{ admin.name }}</small>
      {% endif %}
      <a href="/admin/logout">Sign out</a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main">
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
