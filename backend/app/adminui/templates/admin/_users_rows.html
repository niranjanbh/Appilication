{% for user in users %}
<tr>
  <td><a href="/admin/users/{{ user.id }}">{{ user.name }}</a></td>
  <td style="color:var(--stone)">{{ user.phone or '—' }}</td>
  <td style="color:var(--stone);font-size:12px;">{{ user.email or '—' }}</td>
  <td><span class="chip chip-{{ user.role.value }}">{{ user.role.value }}</span></td>
  <td style="color:var(--stone);font-size:12px;">{{ user.created_at.strftime('%d %b %Y') if user.created_at else '—' }}</td>
  <td>
    {% if user.deleted_at %}
      <span class="chip chip-inactive">Suspended</span>
    {% else %}
      <span class="chip chip-active">Active</span>
    {% endif %}
  </td>
  <td><a href="/admin/users/{{ user.id }}" class="btn btn-secondary btn-sm">View</a></td>
</tr>
{% else %}
<tr><td colspan="7" style="text-align:center;color:var(--stone);padding:20px;">No users found.</td></tr>
{% endfor %}
