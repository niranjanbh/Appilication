{% for doctor, user in doctors %}
<tr>
  <td><input type="checkbox" data-bulk-id="{{ doctor.id }}" :checked="isChecked('{{ doctor.id }}')" @change="toggle('{{ doctor.id }}')"></td>
  <td><a href="/admin/doctors/{{ doctor.id }}">{{ user.name }}</a></td>
  <td style="font-family:monospace;font-size:12px;">{{ doctor.nmc_registration_number }}</td>
  <td style="color:var(--stone);font-size:12px;">{{ doctor.specialty | join(', ') or '—' }}</td>
  <td><span class="chip chip-{{ doctor.status.value }}">{{ doctor.status.value }}</span></td>
  <td style="color:var(--stone);">{{ doctor.revenue_share_pct or '—' }}{% if doctor.revenue_share_pct %}%{% endif %}</td>
  <td><a href="/admin/doctors/{{ doctor.id }}" class="btn btn-secondary btn-sm">View</a></td>
</tr>
{% else %}
<tr><td colspan="7" style="text-align:center;color:var(--stone);padding:20px;">No doctors found.</td></tr>
{% endfor %}
