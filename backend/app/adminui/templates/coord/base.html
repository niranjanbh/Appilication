<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kyros Coordinator{% endblock %}</title>
  <link rel="stylesheet" href="/coord/static/css/admin.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.7/dist/cdn.min.js" defer></script>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Kyros</h1>
      <p>Coordinator</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/coord/" class="{{ 'active' if request.url.path in ['/coord', '/coord/', '/coord/dashboard'] else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/coord/intake" class="{{ 'active' if request.url.path.startswith('/coord/intake') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
        Intake Queue
      </a>
      <a href="/coord/patients" class="{{ 'active' if request.url.path.startswith('/coord/patients') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
        Patients
      </a>
      <a href="/coord/scheduling" class="{{ 'active' if request.url.path.startswith('/coord/scheduling') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Scheduling
      </a>
      <a href="/coord/communication" class="{{ 'active' if request.url.path.startswith('/coord/communication') else '' }}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Communication
      </a>
    </nav>
    <div class="sidebar-footer">
      {% if coord %}
      <small>{{ coord.name }}</small>
      {% endif %}
      <a href="/coord/logout">Sign out</a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main">
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
