{% for patient, user in patients %}
<tr>
  <td><a href="/coord/patients/{{ patient.id }}">{{ user.name }}</a></td>
  <td style="color:var(--stone)">{{ user.phone or '—' }}</td>
  <td style="font-size:12px;color:var(--stone);">{{ patient.primary_conditions | join(', ') or '—' }}</td>
  <td>{% if patient.intake_complete_at %}<span class="chip chip-active">Complete</span>{% else %}<span class="chip chip-draft">Pending</span>{% endif %}</td>
  <td><a href="/coord/patients/{{ patient.id }}" class="btn btn-secondary btn-sm">View</a></td>
</tr>
{% else %}
<tr><td colspan="5" style="text-align:center;color:var(--stone);padding:20px;">No assigned patients found.</td></tr>
{% endfor %}
