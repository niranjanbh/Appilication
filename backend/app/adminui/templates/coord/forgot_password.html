<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyros Coordinator — Reset password</title>
  <link rel="stylesheet" href="/coord/static/css/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Kyros</h1>
    <p>Reset your password.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    {% if notice %}
    <div class="alert-bar alert-bar-success">{{ notice }}</div>
    {% endif %}

    {% if step == 'request' %}
    <form method="POST" action="/coord/forgot-password">
      <div class="form-group">
        <label for="identifier">Email or phone</label>
        <input id="identifier" name="identifier" type="text" autocomplete="username" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Send reset code</button>
    </form>
    {% else %}
    <form method="POST" action="/coord/forgot-password/confirm">
      <input type="hidden" name="identifier" value="{{ identifier }}">
      <div class="form-group">
        <label for="otp">Verification code</label>
        <input id="otp" name="otp" type="text" inputmode="numeric" maxlength="6" required autofocus>
      </div>
      <div class="form-group">
        <label for="new_password">New password</label>
        <input id="new_password" name="new_password" type="password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Set new password</button>
    </form>
    {% endif %}

    <p style="text-align:center;margin-top:16px;font-size:13px;">
      <a href="/coord/login">Back to sign in</a>
    </p>
  </div>
</div>
</body>
</html>
